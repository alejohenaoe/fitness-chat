services:
  nginx:
    image: nginx:alpine
    container_name: fitnesschat_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_build:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped

  frontend-builder:
    build: ./frontend
    container_name: fitnesschat_frontend_builder
    command: sh -c "npm run build && cp -r /app/dist/. /build/"
    volumes:
      - frontend_build:/build
    env_file:
      - ./.env.prod

  backend:
    build: ./backend
    container_name: fitnesschat_backend
    command: sh -c "python manage.py migrate && python manage.py loaddata fixtures/food_database.json && gunicorn fitnesschat.wsgi:application --bind 0.0.0.0:8000 --workers 1 --max-requests 1000 --max-requests-jitter 50"
    env_file:
      - ./.env.prod
    depends_on:
      - db
    restart: unless-stopped

  db:
    container_name: fitnesschat_db
    image: postgres:16
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: FitnessChat_db
      POSTGRES_USER: FitnessChat
      POSTGRES_PASSWORD: FitnessChat
    restart: unless-stopped

volumes:
  postgres_data:
  frontend_build:
